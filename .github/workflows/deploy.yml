name: Deploy to portal.vems.co.ke

on:
  push:
    branches:
      - main
  workflow_dispatch:      # allow manual trigger from GitHub UI

concurrency:
  group: production-deploy
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. SSH agent ─────────────────────────────────────
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ── 3. Add server to known_hosts ─────────────────────
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SERVER_PORT || 22 }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Deploy on server ──────────────────────────────
      - name: Deploy on remote server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_URL: ${{ secrets.REPO_URL }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL || 'admin@vems.co.ke' }}
        run: |
          # All variables are expanded by the runner before being sent over SSH.
          # The remote bash receives them as environment variables.
          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            env DEPLOY_PATH="$DEPLOY_PATH" \
                REPO_URL="$REPO_URL" \
                LETSENCRYPT_EMAIL="$LETSENCRYPT_EMAIL" \
            bash -s << 'REMOTE_SCRIPT'
            set -euo pipefail

            # ── First-time bootstrap: clone repo & init SSL ───────────
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "==> First deploy — cloning repository..."
              mkdir -p "$DEPLOY_PATH"
              git clone "$REPO_URL" "$DEPLOY_PATH"
              echo "==> Running full server setup (SSL, Docker, Nginx)..."
              cd "$DEPLOY_PATH"
              bash scripts/server-setup.sh
              echo "==> Initial setup complete!"
              exit 0
            fi

            # ── Subsequent deploys: pull & restart ────────────────────
            echo "==> Pulling latest code from main..."
            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Building updated Docker image (no cache)..."
            docker compose build --no-cache app

            echo "==> Restarting app container..."
            docker compose up -d --no-deps --remove-orphans app

            echo "==> Reloading nginx..."
            docker compose exec -T nginx nginx -s reload || true

            echo "==> Pruning unused Docker images..."
            docker image prune -f

            echo "==> Deployment complete!"
          REMOTE_SCRIPT

      # ── 5. Health check ──────────────────────────────────
      - name: Verify site is reachable
        run: |
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 --retry 5 --retry-delay 5 \
            https://portal.vems.co.ke)
          echo "HTTP status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "301" && "$HTTP_STATUS" != "302" ]]; then
            echo "::error::Site returned unexpected status $HTTP_STATUS"
            exit 1
          fi
          echo "Site is up and responding correctly."
